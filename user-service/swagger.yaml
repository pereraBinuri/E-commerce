openapi: 3.0.0

info:
  title: User Service API
  version: 3.0.0

components:
  schemas:

    User:
      type: object
      required:
        - id
        - firstName
        - lastName
        - email
        - password
        - phone
        - address
        - address.street
        - address.city
        - address.country
        - address.zipCode
      properties:
        id:
          type: integer
          minimum: 1
          example: 1

        firstName:
          type: string
          example: "John"

        lastName:
          type: string
          example: "Doe"

        email:
          type: string
          format: email
          example: "john@gmail.com"

        password:
          type: string
          example: "123456"

        phone:
          type: string
          example: "+94771234567"

        address:
          type: object
          properties:
            street:
              type: string
              example: "123 Main Street"
            city:
              type: string
              example: "Colombo"
            country:
              type: string
              example: "Sri Lanka"
            zipCode:
              type: string
              example: "10100"

        role:
          type: string
          enum: [customer, admin]
          default: customer
          example: "customer"

        createdAt:
          type: string
          format: date-time

        # updatedAt:
        #   type: string
        #   format: date-time

    UserUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
        address:
          type: object
        role:
          type: string
          enum: [customer, admin]
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:

  /users:
    get:
      summary: Get all users
      responses:
        '200':
          description: List of users

    post:
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
            example:
              id: 1
              firstName: "John"
              lastName: "Doe"
              email: "john@gmail.com"
              password: "123456"
              phone: "+94771234567"
              address:
                street: "123 Main Street"
                city: "Colombo"
                country: "Sri Lanka"
                zipCode: "10100"
              role: "customer"
      responses:
        '201':
          description: User created
        '400':
          description: Validation error

  /users/{id}:
    get:
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User found
        '404':
          description: User not found

    put:
      summary: Update user (partial update supported)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
            example:
              firstName: "John Updated"
              lastName: "Doe"
              email: "john@gmail.com"
              password: "123456"
              phone: "+94771234567"
              address:
                street: "123 Main Street"
                city: "Colombo"
                country: "Sri Lanka"
                zipCode: "10100"
              role: "admin"
      responses:
        '200':
          description: Updated
        '400':
          description: Validation error

    delete:
      summary: Delete user
      parameters:
        - in: path
          name: id
          required: true
      responses:
        '200':
          description: Deleted