openapi: 3.0.0
info:
  title: Review Service API
  version: 2.0.0

components:
  schemas:

    Review:
      type: object
      required:
        - id
        - userId
        - productId
        - userName
        - rating
        - verifiedPurchase
      properties:
        id:
          type: integer
          example: 1

        userId:
          type: integer
          example: 5

        productId:
          type: integer
          example: 101

        userName:
          type: string
          example: "John Doe"

        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating must be between 1 and 5
          example: 5

        comment:
          type: string
          example: "Excellent product!"

        verifiedPurchase:
          type: boolean
          example: true

        createdAt:
          type: string
          format: date-time

        # updatedAt:
        #   type: string
        #   format: date-time

    ReviewUpdate:
      type: object
      properties:
        userName:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        verifiedPurchase:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:

  /reviews:
    get:
      summary: Get all reviews
      responses:
        '200':
          description: List of reviews

    post:
      summary: Create a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Review'
            example:
              id: 1
              userId: 5
              productId: 101
              userName: "John Doe"
              rating: 5
              comment: "Excellent product!"
              verifiedPurchase: true
      responses:
        '201':
          description: Review created successfully
        '400':
          description: Validation error

  /reviews/{id}:
    get:
      summary: Get review by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Review found
        '404':
          description: Not found

    put:
      summary: Update review (partial update supported)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewUpdate'
            example:
              rating: 4
              comment: "Good product"
      responses:
        '200':
          description: Updated
        '400':
          description: Validation error
        '404':
          description: Not found

    delete:
      summary: Delete review
      parameters:
        - in: path
          name: id
          required: true
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found