openapi: 3.0.0
info:
  title: Order Service API
  version: 2.0.0

components:
  schemas:

    OrderItem:
      type: object
      required:
        - productId
        - quantity
        - price
      properties:
        productId:
          type: integer
          example: 101

        quantity:
          type: integer
          minimum: 1
          example: 2

        price:
          type: number
          minimum: 1
          example: 500

    Order:
      type: object
      required:
        - id
        - userId
        - items
        - totalAmount
        - orderStatus
        - shippingAddress
      properties:
        id:
          type: integer
          example: 1

        userId:
          type: integer
          example: 5

        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

        totalAmount:
          type: number
          example: 1000

        orderStatus:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
          example: pending

        shippingAddress:
          type: string
          example: "Colombo, Sri Lanka"

        createdAt:
          type: string
          format: date-time

    OrderUpdate:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalAmount:
          type: number
        orderStatus:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        shippingAddress:
          type: string
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:

  /orders:
    get:
      summary: Get all orders
      responses:
        '200':
          description: List of orders

    post:
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
            example:
              id: 1
              userId: 5
              items:
                - productId: 101
                  quantity: 2
                  price: 500
              totalAmount: 1000
              orderStatus: "pending"
              shippingAddress: "Colombo, Sri Lanka"
      responses:
        '201':
          description: Order created
        '400':
          description: Validation error

  /orders/{id}:
    get:
      summary: Get order by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order found
        '404':
          description: Not found

    put:
      summary: Update order (partial update supported)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdate'
            example:
              items:
                - productId: 101
                  quantity: 3
                  price: 600
              orderStatus: "shipped"
      responses:
        '200':
          description: Updated
        '400':
          description: Validation error
        '404':
          description: Not found

    delete:
      summary: Delete order
      parameters:
        - in: path
          name: id
          required: true
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found