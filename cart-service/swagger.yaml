openapi: 3.0.0
info:
  title: Cart Service API
  version: 2.0.0

components:
  schemas:

    CartItem:
      type: object
      required:
        - id
        - userId
        - productId
        - productName
        - quantity
        - price
      properties:
        id:
          type: integer
          example: 1

        userId:
          type: integer
          example: 5

        productId:
          type: integer
          example: 101

        productName:
          type: string
          example: "Laptop"

        quantity:
          type: integer
          minimum: 1
          example: 2

        price:
          type: number
          minimum: 1
          example: 1200

        totalPrice:
          type: number
          example: 2400

        addedAt:
          type: string
          format: date-time

    CartUpdate:
      type: object
      properties:
        productName:
          type: string
        quantity:
          type: integer
          minimum: 1
        price:
          type: number
          minimum: 1
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:

  /cart:
    get:
      summary: Get all cart items
      responses:
        '200':
          description: List of cart items

    post:
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItem'
            example:
              id: 1
              userId: 5
              productId: 101
              productName: "Laptop"
              quantity: 2
              price: 1200
      responses:
        '201':
          description: Cart item added successfully
        '400':
          description: Validation error

  /cart/{id}:
    get:
      summary: Get cart item by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cart item found
        '404':
          description: Not found

    put:
      summary: Update cart item (partial update supported)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartUpdate'
            example:
              productName: "Laptop updated"
              quantity: 3
              price: 1300
      responses:
        '200':
          description: Updated
        '400':
          description: Validation error
        '404':
          description: Not found

    delete:
      summary: Delete cart item
      parameters:
        - in: path
          name: id
          required: true
      responses:
        '200':
          description: Deleted
        '404':
          description: Not found