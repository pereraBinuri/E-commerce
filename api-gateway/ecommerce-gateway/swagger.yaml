                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': { description: Server error }

    delete:
      tags: [Payments]
      summary: Delete payment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200': { description: Payment deleted successfully }
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': { description: Server error }
        
# ================= CART =================
  /gateway/cart:
    get:
      tags: [Cart]
      summary: Get all cart items
      responses:
        '200': { description: Cart items list }
        '500': { description: Server error }

    post:
      tags: [Cart]
      summary: Add to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - userId
                - productId
                - productName
                - quantity
                - price
              properties:
                id:
                  type: integer

                userId:
                  type: integer

                productId:
                  type: integer

                productName:
                  type: string

                quantity:
                  type: integer
                  minimum: 1

                price:
                  type: number
                  minimum: 1

                totalPrice:
                  type: number
                  minimum: 1
                  description: Auto-calculated as quantity × price

            example:
              id: 1
              userId: 5
              productId: 101
              productName: "Laptop"
              quantity: 2
              price: 1200

      responses:
        '201': { description: Item added successfully }
        '400':
          description: Missing fields or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': { description: Server error }


  /gateway/cart/{id}:
    get:
      tags: [Cart]
      summary: Get cart item by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200': { description: Cart item found }
        '404':
          description: Cart item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': { description: Server error }

    put:
      tags: [Cart]
      summary: Update cart item (partial update supported)
      description: Only provided fields will be updated
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productName:
                  type: string

                quantity:
                  type: integer
                  minimum: 1

                price:
                  type: number
                  minimum: 1

            example:
              productName: "Laptop updated"
              quantity: 3
              price: 1300

      responses:
        '200': { description: Cart updated successfully }
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cart item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': { description: Server error }

    delete:
      tags: [Cart]
      summary: Delete cart item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200': { description: Cart item deleted successfully }
        '404':
          description: Cart item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': { description: Server error }

# ================= REVIEWS =================
  /gateway/reviews:
    get:
      tags: [Reviews]
      summary: Get all reviews
      responses:
        '200':
          description: Review list
        '500':
          description: Server error

    post:
      tags: [Reviews]
      summary: Create review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - userId
                - productId
                - userName
                - rating
                - verifiedPurchase
              properties:
                id:
                  type: integer

                userId:
                  type: integer

                productId:
                  type: integer

                userName:
                  type: string

                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: Rating must be between 1 and 5

                comment:
                  type: string

                verifiedPurchase:
                  type: boolean

            example:
              id: 1
              userId: 5
              productId: 101
              userName: "John Doe"
              rating: 5
              comment: "Excellent product!"
              verifiedPurchase: true

      responses:
        '201':
          description: Review created successfully
        '400':
          description: Missing fields, invalid data types, or rating out of range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error


  /gateway/reviews/{id}:
    get:
      tags: [Reviews]
      summary: Get review by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Review found
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error

    put:
      tags: [Reviews]
      summary: Update review (partial update supported)
      description: |
        Only provided fields will be updated.
        Other fields remain unchanged.

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userName:
                  type: string

                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: Rating must be between 1 and 5

                comment:
                  type: string

                verifiedPurchase:
                  type: boolean

            example:
              rating: 4
              comment: "Good product!"

      responses:
        '200':
          description: Review updated successfully
        '400':
          description: Invalid data types or rating out of range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error

    delete:
      tags: [Reviews]
      summary: Delete review
      parameters:
        - in: path
          name: id
          required: true
      responses:
        '200':
          description: Review deleted successfully
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error